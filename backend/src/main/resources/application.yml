spring:
  application:
    name: opendatamask
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendatamask}
    username: ${DATABASE_USERNAME:opendatamask}
    password: ${DATABASE_PASSWORD:opendatamask}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
    saml2:
      relyingparty:
        registration:
          default:
            entity-id: ${SAML_SP_ENTITY_ID:https://opendatamask.example.com}
            signing:
              credentials:
                - private-key-location: ${SAML_SP_PRIVATE_KEY:classpath:saml/sp-private-key.pem}
                  certificate-location: ${SAML_SP_CERTIFICATE:classpath:saml/sp-certificate.pem}
            assertingparty:
              metadata-uri: ${SAML_IDP_METADATA_URI:}
              singlesignon:
                url: ${SAML_IDP_SSO_URL:}
                sign-request: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

server:
  port: ${SERVER_PORT:8080}

opendatamask:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: ${JWT_EXPIRATION:86400000}
  encryption:
    key: ${ENCRYPTION_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

