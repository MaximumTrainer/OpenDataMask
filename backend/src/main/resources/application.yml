spring:
  application:
    name: opendatamask
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendatamask}
    username: ${DATABASE_USERNAME:opendatamask}
    password: ${DATABASE_PASSWORD:opendatamask}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
  # SAML2 SSO is configured via environment variables at deployment time.
  # Set the variables below (and uncomment spring-security-saml2-service-provider
  # in build.gradle.kts) to activate the SamlSecurityConfig filter chain.
  # Required env vars:
  #   SAML_IDP_METADATA_URI  – IdP metadata URL (activates the SAML chain when set)
  #   SAML_SP_ENTITY_ID      – SP entity ID (default: https://opendatamask.example.com)
  #   SAML_SP_PRIVATE_KEY    – path to SP signing key PEM
  #   SAML_SP_CERTIFICATE    – path to SP certificate PEM
  #   SAML_IDP_SSO_URL       – IdP SSO redirect URL

  # OIDC/OAuth2 SSO is configured via environment variables at deployment time.
  # The OidcSecurityConfig filter chain (Order=1) activates only when the env var
  # OIDC_ISSUER_URI is set (it maps to spring.security.oauth2.client.registration.oidc.issuer-uri).
  # Works with any standards-compliant OIDC provider (Okta, Azure AD, Google Workspace, Keycloak).
  # Required env vars:
  #   OIDC_ISSUER_URI    – IdP discovery URL (e.g. https://accounts.google.com)
  #   OIDC_CLIENT_ID     – OAuth2 client ID registered with the IdP
  #   OIDC_CLIENT_SECRET – OAuth2 client secret
  # Note: Do NOT define these with empty defaults here — that would falsely trigger
  #       @ConditionalOnProperty(matchIfMissing=false). Set env vars only at deployment time.
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

server:
  port: ${SERVER_PORT:8080}

opendatamask:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: ${JWT_EXPIRATION:86400000}
  encryption:
    key: ${ENCRYPTION_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

