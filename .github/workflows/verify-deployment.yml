name: Deployment Verification

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to verify'
        required: false
        default: 'staging'
        type: choice
        options: [staging, production]
      server_url:
        description: 'Live server base URL to health-check after smoke tests (optional, e.g. http://1.2.3.4)'
        required: false
        default: ''
        type: string
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run smoke / verification tests
        run: cd backend && ./gradlew verificationTest --no-daemon
        env:
          JWT_SECRET: smoke-test-jwt-secret-not-used-in-production
          ENCRYPTION_KEY: 0123456789abcdef

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: backend/build/reports/tests/verificationTest/

      - name: Publish smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-junit-xml
          path: backend/build/reports/tests/verificationTest/**/*.xml

      - name: Verify live server health (if SERVER_URL provided)
        if: ${{ github.event.inputs.server_url != '' }}
        run: |
          SERVER_URL="${{ github.event.inputs.server_url }}"
          HEALTH_URL="${SERVER_URL}:8080/actuator/health"
          echo "Checking live server: ${HEALTH_URL}"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${HEALTH_URL}" || true)
            if [ "${STATUS}" = "200" ]; then
              echo "✅ Live server health check passed (HTTP 200)"
              echo "### Live Server Verification" >> "$GITHUB_STEP_SUMMARY"
              echo "- **URL**: ${HEALTH_URL}" >> "$GITHUB_STEP_SUMMARY"
              echo "- **Status**: ✅ HTTP 200 OK" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i: HTTP ${STATUS} – retrying in 10s..."
            sleep 10
          done
          echo "::error::Live server health check failed after 10 attempts: ${HEALTH_URL}"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed! Deployment verification did not pass."
          echo "::error::Check the uploaded smoke-test-results artifact for details."
          exit 1
