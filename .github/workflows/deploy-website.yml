name: Deploy Website

# Deploy the static documentation site to GitHub Pages.
# Generates fresh UI screenshots by spinning up the full Docker stack, then
# passes them to the Pages build so the guide always shows the current UI.
on:
  push:
    branches: [main]
    paths:
      - 'docs/website/**'
      - 'verification/**'
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; skip intermediate queued runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-screenshots:
    name: Generate UI Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      API_BASE: http://localhost:8080
      ODM_USER: guide_user
      ODM_PASS: "Guide!Pass123"
      ODM_EMAIL: guide@odm-docs.local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + dependencies
        run: |
          python3 -m pip install -q playwright
          python3 -m playwright install chromium --with-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start all services
        working-directory: verification
        run: docker compose up -d --build

      - name: Wait for backend health
        timeout-minutes: 12
        run: |
          echo "Waiting for backend to become healthy…"
          for i in $(seq 1 144); do
            STATUS=$(curl -sf "${API_BASE}/actuator/health" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" \
              2>/dev/null || true)
            if [ "${STATUS}" = "UP" ]; then
              echo "✅ Backend healthy after ~$((i*5))s"
              exit 0
            fi
            echo "  [${i}/144] status='${STATUS}' – retrying in 5s…"
            sleep 5
          done
          echo "::error::Backend did not become healthy within 12 minutes."
          docker compose -f verification/docker-compose.yml logs --tail=100 backend
          exit 1

      - name: Wait for frontend
        timeout-minutes: 5
        run: |
          echo "Waiting for frontend…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost/ -o /dev/null; then
              echo "✅ Frontend ready after ~$((i*5))s"
              exit 0
            fi
            echo "  [${i}/60] not ready – retrying in 5s…"
            sleep 5
          done
          echo "::warning::Frontend did not respond within 5 minutes."

      - name: Generate screenshots
        run: |
          python3 verification/take_screenshots.py \
            --url "http://localhost" \
            --api "${API_BASE}" \
            --username "${ODM_USER}" \
            --password "${ODM_PASS}" \
            --email    "${ODM_EMAIL}" \
            --source-host source_db \
            --source-db   source_db \
            --source-user source_user \
            --source-pass source_pass \
            --target-host target_db \
            --target-db   target_db \
            --target-user target_user \
            --target-pass target_pass \
            --run-job \
            --output-dir  docs/website/screenshots
        env:
          PYTHONUNBUFFERED: "1"

      - name: List generated screenshots
        run: |
          echo "Screenshots in docs/website/screenshots/:"
          ls -la docs/website/screenshots/ || echo "(directory not found)"

      - name: Verify expected screenshots
        run: |
          EXPECTED_IMAGES=(
            01-login-page.png
            02-register-page.png
            03-login-filled.png
            04-workspaces-list.png
            05-create-workspace-modal.png
            07-workspace-overview.png
            08-connections-configured.png
            09-add-connection-modal.png
            10-connection-form-filled.png
            11-tables-configured.png
            12-generators-expanded.png
            13-add-table-modal.png
            14-data-mapping-wizard.png
            15-data-mapping-columns.png
            16-jobs-list.png
            17-run-job-modal.png
            19-job-logs.png
            20-sensitivity-rules.png
            21-new-pii-rule-drawer.png
            22-pii-rule-configured.png
          )
          MISSING=0
          for img in "${EXPECTED_IMAGES[@]}"; do
            if [ ! -f "docs/website/screenshots/${img}" ]; then
              echo "::warning::Missing screenshot: ${img}"
              MISSING=$((MISSING + 1))
            fi
          done
          TOTAL=${#EXPECTED_IMAGES[@]}
          FOUND=$((TOTAL - MISSING))
          echo "✅ ${FOUND}/${TOTAL} expected screenshots found."
          if [ "${MISSING}" -gt 0 ]; then
            echo "::error::${MISSING} screenshots missing — failing workflow to prevent deploying docs with missing guide images."
            exit 1
          fi

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: docs/website/screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: Collect Docker logs on failure
        if: failure()
        working-directory: verification
        run: |
          echo "=== backend ===" && docker compose logs --tail=150 backend  || true
          echo "=== frontend ===" && docker compose logs --tail=50  frontend || true

      - name: Tear down sandbox
        if: always()
        working-directory: verification
        run: docker compose down --volumes --remove-orphans

  build:
    name: Build Website
    runs-on: ubuntu-latest
    needs: generate-screenshots

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download screenshots artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-screenshots
          path: docs/website/screenshots/
        continue-on-error: true

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/website

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
